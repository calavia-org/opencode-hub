command: validate
description: Validate implementation against specification
agent: spec-driven
mode: spec-driven
skill: spec-driven
---

Validate current implementation against the spec:

1. Read SPEC.md or specified spec file
2. Check each acceptance criterion
3. Run tests
4. Report:
   - ✅ Criteria met
   - ❌ Criteria not met (with details)
   - ⚠️ Needs clarification
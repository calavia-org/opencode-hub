name: SPEC Archive Automation

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no changes)'
        required: false
        type: boolean
        default: false

jobs:
  archive-specs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      completed: ${{ steps.find_specs.outputs.completed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Find completed SPECs
        id: find_specs
        run: |
          import os
          import re
          from pathlib import Path
          
          specs_dir = Path('.specs')
          completed = []
          
          for spec_file in specs_dir.glob('*.md'):
            if spec_file.name == 'README.md':
              continue
            
            content = spec_file.read_text()
            
            # Parse frontmatter
            if content.startswith('---'):
              end = content.find('---', 3)
              if end > 0:
                frontmatter = content[3:end]
                if re.search(r'status:\s*completed', frontmatter, re.IGNORECASE):
                  completed.append(spec_file.name)
          
          completed_str = ','.join(completed)
          print(f"completed={completed_str}")
          
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f"completed={completed_str}\n")
        shell: python

      - name: Archive SPECs
        if: >-
          ${{ steps.find_specs.outputs.completed != '' 
              && github.inputs.dry_run != true }}
        run: |
          mkdir -p .specs/archived
          
          completed_list = """${{ steps.find_specs.outputs.completed }}""".split(',')
          
          for spec in completed_list:
            spec = spec.strip()
            if spec:
              echo "Archiving: $spec"
              mv ".specs/$spec" ".specs/archived/$spec" || true

      - name: Update SPEC index
        if: >-
          ${{ steps.find_specs.outputs.completed != '' 
              && github.inputs.dry_run != true }}
        run: |
          echo "Updated index: ${{ steps.find_specs.outputs.completed }}"

      - name: Commit archived SPECS
        if: >-
          ${{ steps.find_specs.outputs.completed != '' 
              && github.inputs.dry_run != true }}
        run: |
          git config --local user.email "bot@opencode.dev"
          git config --local user.name "OpenCode Bot"
          
          git add .specs/
          git commit -m "chore: archive completed SPECs" || echo "Nothing to archive"
          
          git push || echo "Push failed - may need token"